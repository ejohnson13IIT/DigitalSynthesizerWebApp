<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>UDP Knob Control</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
      body {
        font-family: sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        background-color: #111;
        color: #fff;
        padding: 20px;
      }

      .knobs-container {
        display: flex;
        flex-direction: column;
        gap: 40px;
        margin: 20px;
      }

      .rack {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 30px;
        margin: 10px;
        padding: 20px;
        background: #222;
        border-radius: 10px;
        border: 1px solid #00ffcc;
      }

      .knob-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin: 10px;
      }

      .knob {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        background: #222;
        border: 4px solid #00ffcc;
        position: relative;
        cursor: pointer;
        transform-origin: 50% 50%;
      }

      .knob::after {
        content: '';
        position: absolute;
        width: 4px;
        height: 50%;
        background: #00ffcc;
        top: 0;
        left: calc(50% - 2px);
        transform-origin: bottom;
      }

      .value-display {
        margin-top: 10px;
        font-size: 1.2em;
        color: #00ffcc;
      }

      .control-panel {
        margin: 20px;
        display: flex;
        align-items: center;
        gap: 15px;
        background: #222;
        padding: 15px;
        border-radius: 8px;
        border: 1px solid #00ffcc;
      }

      button {
        padding: 10px 20px;
        background: #00ffcc;
        border: none;
        border-radius: 5px;
        color: #111;
        font-size: 1.1em;
        cursor: pointer;
      }

      button:hover {
        background: #00ddaa;
      }

      label {
        margin: 10px;
        font-size: 1.2em;
      }

      input[type="number"] {
        padding: 8px;
        width: 80px;
        background: #333;
        border: 2px solid #00ffcc;
        border-radius: 5px;
        color: #fff;
        font-size: 1.1em;
      }

      input[type="number"]:focus {
        outline: none;
        border-color: #00ddaa;
      }

      /* Remove spinner buttons from number input */
      input[type="number"]::-webkit-inner-spin-button,
      input[type="number"]::-webkit-outer-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }

      .status-message {
        margin: 15px;
        font-size: 1.1em;
        color: #00ffcc;
      }

      .range-display {
        margin-top: 6px;
        font-size: 0.95em;
        color: #88fff0;
      }
    </style>
  </head>
  <body>
    <h1>Digital Synthesizer Control</h1>
    <div id="statusMessage" class="status-message">Loading plugin data...</div>
    <div class="knobs-container" id="knobsContainer"></div>

    <script>
      const socket = io();
      const KNOB_SWEEP_DEGREES = 270;
      const KNOB_MIN_ANGLE = -135;
      const KNOB_MAX_ANGLE = KNOB_MIN_ANGLE + KNOB_SWEEP_DEGREES;
      const knobState = new Map(); // key: `${pluginId}-${paramId}` => { normalized, raw }

      function normalizeValue(value, min, max) {
        if (max <= min) {
          return 0;
        }
        return (value - min) / (max - min);
      }

      function denormalizeValue(normalized, min, max) {
        if (max <= min) {
          return min;
        }
        return min + normalized * (max - min);
      }

      function angleFromNormalized(normalized) {
        return KNOB_MIN_ANGLE + normalized * KNOB_SWEEP_DEGREES;
      }

      function normalizedFromAngle(angle) {
        let clamped = Math.max(KNOB_MIN_ANGLE, Math.min(KNOB_MAX_ANGLE, angle));
        return (clamped - KNOB_MIN_ANGLE) / KNOB_SWEEP_DEGREES;
      }

      function formatValue(value) {
        if (Math.abs(value) >= 100 || Math.abs(value) < 0.01) {
          return value.toExponential(2);
        }
        return value.toFixed(3).replace(/\.?0+$/, '');
      }

      function createRack(plugin) {
        const rack = document.createElement('div');
        rack.className = 'rack';
        rack.dataset.pluginId = plugin.id;

        const header = document.createElement('h2');
        header.textContent = `${plugin.name || 'Plugin'} (ID ${plugin.id})`;
        rack.appendChild(header);

        plugin.parameters.forEach((param) => {
          const knob = createKnob(plugin.id, param);
          rack.appendChild(knob);
        });

        return rack;
      }

      function createKnob(pluginId, param) {
        const wrapper = document.createElement('div');
        wrapper.className = 'knob-wrapper';
        
        const label = document.createElement('label');
        const paramName = param.name || `Parameter ${param.id}`;
        label.textContent = paramName;
        
        const knob = document.createElement('div');
        knob.className = 'knob';
        knob.id = `rack-${pluginId}-knob-${param.id}`;
        
        const valueDisplay = document.createElement('div');
        valueDisplay.className = 'value-display';
        valueDisplay.textContent = `Value: ${formatValue(param.value)}`;

        const rangeDisplay = document.createElement('div');
        rangeDisplay.className = 'range-display';
        rangeDisplay.textContent = `Range: ${formatValue(param.min)} – ${formatValue(param.max)}`;
        
        wrapper.appendChild(label);
        wrapper.appendChild(knob);
        wrapper.appendChild(valueDisplay);
        wrapper.appendChild(rangeDisplay);
        
        let isDragging = false;

        function updateKnobUI(normalizedValue) {
          const clamped = Math.max(0, Math.min(1, normalizedValue));
          const angle = angleFromNormalized(clamped);
          knob.style.transform = `rotate(${angle}deg)`;
          const rawValue = denormalizeValue(clamped, param.min, param.max);
          valueDisplay.textContent = `Value: ${formatValue(rawValue)}`;

          const stateKey = `${pluginId}-${param.id}`;
          const previous = knobState.get(stateKey);

          if (!previous || Math.abs(previous.normalized - clamped) > 0.001) {
            knobState.set(stateKey, { normalized: clamped, raw: rawValue });
            socket.emit('knob_change', {
              rack: pluginId,
              knob: param.id,
              value: clamped,
              displayValue: rawValue,
            });
            console.log(`📤 Rack ${pluginId} Param ${param.id} -> ${rawValue} (norm ${clamped.toFixed(3)})`);
          }
        }
        
        function rotateKnob(e) {
          if (!isDragging) return;
          
          const knobRect = knob.getBoundingClientRect();
          const centerX = knobRect.left + knobRect.width / 2;
          const centerY = knobRect.top + knobRect.height / 2;

          const angle = Math.atan2(
            centerY - e.clientY,
            e.clientX - centerX
          ) * 180 / Math.PI;

          const normalized = normalizedFromAngle(angle);
          updateKnobUI(normalized);
        }
        
        knob.addEventListener('mousedown', (e) => {
          e.preventDefault();
          isDragging = true;
          document.addEventListener('mousemove', rotateKnob);
        }, { passive: false });

        knob.addEventListener('touchstart', (e) => {
          isDragging = true;
          document.addEventListener('touchmove', handleTouchMove, { passive: false });
        }, { passive: false });

        function handleTouchMove(e) {
          if (!isDragging) return;
          const touch = e.touches[0];
          const simulatedEvent = {
            clientX: touch.clientX,
            clientY: touch.clientY,
          };
          rotateKnob(simulatedEvent);
          e.preventDefault();
        }
        
        function endInteraction() {
          if (isDragging) {
            isDragging = false;
            document.removeEventListener('mousemove', rotateKnob);
            document.removeEventListener('touchmove', handleTouchMove);
          }
        }

        document.addEventListener('touchend', endInteraction);
        document.addEventListener('touchcancel', endInteraction);
        document.addEventListener('mouseup', endInteraction);

        // Initialize position
        const initialNormalized = normalizeValue(param.value, param.min, param.max);
        knob.style.transform = `rotate(${angleFromNormalized(initialNormalized)}deg)`;

        return wrapper;
      }

      async function loadPlugins() {
        const statusMessage = document.getElementById('statusMessage');
        const container = document.getElementById('knobsContainer');

        try {
          statusMessage.textContent = 'Loading plugin data...';
          const response = await fetch('/api/plugins');
          if (!response.ok) {
            throw new Error(`Server responded with ${response.status}`);
          }
          const data = await response.json();
          const plugins = data.plugins || [];

          container.innerHTML = '';
          if (plugins.length === 0) {
            statusMessage.textContent = 'No plugins loaded from Carla.';
            return;
          }

          plugins.forEach((plugin) => {
            const rack = createRack(plugin);
            container.appendChild(rack);
          });

          statusMessage.textContent = `Loaded ${plugins.length} plugin(s) from Carla.`;
        } catch (error) {
          console.error('Failed to load plugin metadata:', error);
          statusMessage.textContent = 'Failed to load plugin data. Ensure Carla API is running.';
        }
      }

      window.addEventListener('DOMContentLoaded', () => {
        loadPlugins();
      });
    </script>
  </body>
</html>
