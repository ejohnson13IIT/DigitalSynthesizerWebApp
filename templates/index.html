<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>UDP Control Knob</title>
  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #111;
      color: white;
      font-family: sans-serif;
      flex-direction: column;
    }
    .knob-container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    input[type=range] {
      appearance: none;
      width: 150px;
      height: 150px;
      border-radius: 50%;
      background: conic-gradient(#0ff calc(var(--val, 0) * 1%), #333 0);
      transform: rotate(-135deg);
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      appearance: none;
      width: 20px;
      height: 20px;
      background: #0ff;
      border-radius: 50%;
      cursor: pointer;
    }
    #value {
      margin-top: 20px;
      font-size: 1.5em;
    }
  </style>
</head>
<body>
  <div class="knob-container">
    <input id="knob" type="range" min="0" max="100" value="50">
    <div id="value">50</div>
  </div>

  <script>
    // Connect to Flask SocketIO
    const socket = io();

    const knob = document.getElementById("knob");
    const valText = document.getElementById("value");

    function updateKnobVisual(value) {
      knob.style.setProperty("--val", value);
      valText.textContent = value;
    }

    knob.addEventListener("input", () => {
      const value = knob.value;
      updateKnobVisual(value);
      socket.emit("knob_change", { value: value });
    });

    // Initialize the visual
    updateKnobVisual(knob.value);
  </script>
</body>
</html>
