<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>UDP Knob Control</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
      body {
        font-family: sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        background-color: #111;
        color: #fff;
        padding: 20px;
      }

      .knobs-container {
        display: flex;
        flex-direction: column;
        gap: 40px;
        margin: 20px;
      }

      .rack {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 30px;
        margin: 10px;
        padding: 20px;
        background: #222;
        border-radius: 10px;
        border: 1px solid #00ffcc;
        position: relative;
      }

      .rack-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
        margin-bottom: 10px;
      }

      .rack-title {
        margin: 0;
        flex: 1;
      }

      .rack-controls {
        display: flex;
        flex-direction: column;
        gap: 5px;
      }

      .arrow-button {
        width: 30px;
        height: 30px;
        background: #00ffcc;
        border: none;
        border-radius: 5px;
        color: #111;
        font-size: 18px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.2s;
      }

      .arrow-button:hover {
        background: #00ddaa;
      }

      .arrow-button:disabled {
        background: #555;
        cursor: not-allowed;
        opacity: 0.5;
      }

      .remove-button {
        background: #ff4444 !important;
        color: #fff !important;
        font-size: 20px;
        font-weight: bold;
      }

      .remove-button:hover {
        background: #ff6666 !important;
      }

      .knob-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin: 10px;
      }

      .knob {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        background: #222;
        border: 4px solid #00ffcc;
        position: relative;
        cursor: pointer;
        transform-origin: 50% 50%;
      }

      .knob::after {
        content: '';
        position: absolute;
        width: 4px;
        height: 50%;
        background: #00ffcc;
        top: 0;
        left: calc(50% - 2px);
        transform-origin: bottom;
      }

      .value-display {
        margin-top: 10px;
        font-size: 1.2em;
        color: #00ffcc;
      }

      .control-panel {
        margin: 20px;
        display: flex;
        align-items: center;
        gap: 15px;
        background: #222;
        padding: 15px;
        border-radius: 8px;
        border: 1px solid #00ffcc;
      }

      button {
        padding: 10px 20px;
        background: #00ffcc;
        border: none;
        border-radius: 5px;
        color: #111;
        font-size: 1.1em;
        cursor: pointer;
      }

      button:hover {
        background: #00ddaa;
      }

      label {
        margin: 10px;
        font-size: 1.2em;
      }

      select {
        padding: 8px 12px;
        background: #333;
        border: 2px solid #00ffcc;
        border-radius: 5px;
        color: #fff;
        font-size: 1.05em;
      }

      select:focus {
        outline: none;
        border-color: #00ddaa;
      }

      input[type="number"] {
        padding: 8px;
        width: 80px;
        background: #333;
        border: 2px solid #00ffcc;
        border-radius: 5px;
        color: #fff;
        font-size: 1.1em;
      }

      input[type="number"]:focus {
        outline: none;
        border-color: #00ddaa;
      }

      /* Remove spinner buttons from number input */
      input[type="number"]::-webkit-inner-spin-button,
      input[type="number"]::-webkit-outer-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }

      .status-message {
        margin: 15px;
        font-size: 1.1em;
        color: #00ffcc;
      }

      .range-display {
        margin-top: 6px;
        font-size: 0.95em;
        color: #88fff0;
      }

      .action-status {
        margin-left: 10px;
        font-size: 0.95em;
        color: #ffde59;
      }
    </style>
  </head>
  <body>
    <h1>Digital Synthesizer Control</h1>
    <div class="control-panel">
      <label for="pluginSelect">Add plugin:</label>
      <select id="pluginSelect">
        <option value="">Select a plugin…</option>
      </select>
      <button id="addPluginButton">Add Plugin</button>
      <button id="discoverPluginsButton">Discover Plugins</button>
      <span id="pluginActionStatus" class="action-status"></span>
    </div>
    <div id="statusMessage" class="status-message">Loading plugin data...</div>
    <div class="knobs-container" id="knobsContainer"></div>

    <script>
      const socket = io();
      const KNOB_SWEEP_DEGREES = 270;
      const KNOB_MIN_ANGLE = -135;
      const KNOB_MAX_ANGLE = KNOB_MIN_ANGLE + KNOB_SWEEP_DEGREES;
      const knobState = new Map(); // key: `${pluginId}-${paramId}` => { normalized, raw }
      const DRAG_SENSITIVITY = 300; // pixels required for a full sweep
      let availablePlugins = [];

      const pluginSelect = document.getElementById('pluginSelect');
      const addPluginButton = document.getElementById('addPluginButton');
      const discoverPluginsButton = document.getElementById('discoverPluginsButton');
      const pluginActionStatus = document.getElementById('pluginActionStatus');
      addPluginButton.addEventListener('click', handleAddPlugin);
      discoverPluginsButton.addEventListener('click', handleDiscoverPlugins);

      function setPluginStatus(message, type = 'info') {
        if (!pluginActionStatus) return;
        pluginActionStatus.textContent = message || '';
        let color = '#00ffcc';
        if (type === 'error') {
          color = '#ff6b6b';
        } else if (type === 'success') {
          color = '#8aff8a';
        }
        pluginActionStatus.style.color = color;
      }

      function normalizeValue(value, min, max) {
        if (max <= min) {
          return 0;
        }
        return (value - min) / (max - min);
      }

      function denormalizeValue(normalized, min, max) {
        if (max <= min) {
          return min;
        }
        return min + normalized * (max - min);
      }

      function angleFromNormalized(normalized) {
        return KNOB_MIN_ANGLE + normalized * KNOB_SWEEP_DEGREES;
      }

      function normalizedFromAngle(angle) {
        let clamped = Math.max(KNOB_MIN_ANGLE, Math.min(KNOB_MAX_ANGLE, angle));
        return (clamped - KNOB_MIN_ANGLE) / KNOB_SWEEP_DEGREES;
      }

      function formatValue(value) {
        if (Math.abs(value) >= 100 || Math.abs(value) < 0.01) {
          return value.toExponential(2);
        }
        return value.toFixed(3).replace(/\.?0+$/, '');
      }

      function createRack(plugin, chainPosition, chainLength) {
        const rack = document.createElement('div');
        rack.className = 'rack';
        rack.dataset.pluginId = plugin.id;
        rack.dataset.chainPosition = chainPosition;

        // Create header with title and controls
        const headerContainer = document.createElement('div');
        headerContainer.className = 'rack-header';

        const header = document.createElement('h2');
        header.className = 'rack-title';
        header.textContent = `${plugin.name || 'Plugin'} (ID ${plugin.id})`;
        headerContainer.appendChild(header);

        // Create arrow controls
        const controls = document.createElement('div');
        controls.className = 'rack-controls';

        const upArrow = document.createElement('button');
        upArrow.className = 'arrow-button';
        upArrow.textContent = '↑';
        upArrow.title = 'Move up in chain';
        upArrow.disabled = chainPosition === 0;
        upArrow.addEventListener('click', () => movePluginInChain(plugin.id, 'up'));

        const downArrow = document.createElement('button');
        downArrow.className = 'arrow-button';
        downArrow.textContent = '↓';
        downArrow.title = 'Move down in chain';
        downArrow.disabled = chainPosition === chainLength - 1;
        downArrow.addEventListener('click', () => movePluginInChain(plugin.id, 'down'));

        const removeButton = document.createElement('button');
        removeButton.className = 'arrow-button remove-button';
        removeButton.textContent = '×';
        removeButton.title = 'Remove plugin';
        removeButton.style.color = '#ff6b6b';
        removeButton.addEventListener('click', () => removePlugin(plugin.id, plugin.name));

        controls.appendChild(upArrow);
        controls.appendChild(downArrow);
        controls.appendChild(removeButton);
        headerContainer.appendChild(controls);
        rack.appendChild(headerContainer);

        // For NewProject (starting plugin), only show first 14 parameters
        // Otherwise show all parameters
        const isNewProject = plugin.id === 0 || plugin.name === "NewProject";
        const parametersToShow = isNewProject 
          ? plugin.parameters.slice(0, 14)
          : plugin.parameters;
        
        parametersToShow.forEach((param) => {
          const knob = createKnob(plugin.id, param);
          rack.appendChild(knob);
        });

        return rack;
      }

      async function movePluginInChain(pluginId, direction) {
        const container = document.getElementById('knobsContainer');
        const racks = Array.from(container.querySelectorAll('.rack'));
        
        // Find the current rack and its position
        const currentRack = racks.find(rack => parseInt(rack.dataset.pluginId) === pluginId);
        if (!currentRack) {
          console.error('Could not find rack for plugin', pluginId);
          return;
        }
        
        const currentIndex = racks.indexOf(currentRack);
        const newIndex = direction === 'up' ? currentIndex - 1 : currentIndex + 1;
        
        // Validate new position
        if (newIndex < 0 || newIndex >= racks.length) {
          return; // Already at edge, arrow should be disabled
        }
        
        // Optimistically swap the boxes in the DOM immediately
        const targetRack = racks[newIndex];
        if (direction === 'up') {
          container.insertBefore(currentRack, targetRack);
        } else {
          container.insertBefore(targetRack, currentRack);
        }
        
        // Update chain positions in dataset
        const allRacks = Array.from(container.querySelectorAll('.rack'));
        allRacks.forEach((rack, index) => {
          rack.dataset.chainPosition = index;
        });
        
        // Update arrow button states
        updateArrowStates(container);
        
        // Then call the API to update JACK routing
        try {
          const response = await fetch('/api/plugins/move', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ plugin_id: pluginId, direction: direction }),
          });

          if (!response.ok) {
            const data = await response.json();
            throw new Error(data.error || `Server responded with ${response.status}`);
          }

          // Reload plugins to ensure UI matches server state
          await loadPlugins();
        } catch (error) {
          console.error('Failed to move plugin:', error);
          setPluginStatus(`Failed to move plugin: ${error.message}`, 'error');
          // Revert on error by reloading
          await loadPlugins();
        }
      }

      async function removePlugin(pluginId, pluginName) {
        // Confirm removal
        if (!confirm(`Are you sure you want to remove "${pluginName}" (ID ${pluginId})?`)) {
          return;
        }

        try {
          setPluginStatus('Removing plugin...', 'info');
          const response = await fetch('/api/plugins/remove', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ plugin_id: pluginId }),
          });

          if (!response.ok) {
            const data = await response.json();
            throw new Error(data.error || `Server responded with ${response.status}`);
          }

          const data = await response.json();
          setPluginStatus(`Removed "${data.removed_plugin_name}"`, 'success');
          
          // Reload plugins to update UI
          await loadPlugins();
          
          // Clear status after 3 seconds
          setTimeout(() => setPluginStatus('', 'info'), 3000);
        } catch (error) {
          console.error('Failed to remove plugin:', error);
          setPluginStatus(`Failed to remove plugin: ${error.message}`, 'error');
        }
      }
      
      function updateArrowStates(container) {
        const racks = Array.from(container.querySelectorAll('.rack'));
        racks.forEach((rack, index) => {
          // Get arrow buttons (excluding remove button)
          const buttons = rack.querySelectorAll('.arrow-button:not(.remove-button)');
          const upArrow = buttons[0];
          const downArrow = buttons[1];
          
          if (upArrow) {
            upArrow.disabled = index === 0;
          }
          if (downArrow) {
            downArrow.disabled = index === racks.length - 1;
          }
        });
      }

      function createKnob(pluginId, param) {
        const wrapper = document.createElement('div');
        wrapper.className = 'knob-wrapper';
        
        // Check if this is NewProject and get hardcoded mapping
        const isNewProject = pluginId === 0;
        let knobConfig = null;
        if (isNewProject) {
          // Hardcoded knob mappings for NewProject
          const paramId = param.id;
          if ([0, 3, 6, 9].includes(paramId)) {
            // Octave knobs: -2, -1, 0, 1, 2 (discrete)
            knobConfig = {
              type: 'octave',
              min: -2,
              max: 2,
              discrete: true,
              values: [-2, -1, 0, 1, 2]
            };
          } else if ([1, 4, 7, 10].includes(paramId)) {
            // Semitone knobs: -12 to 12 (continuous)
            knobConfig = {
              type: 'semitone',
              min: -12,
              max: 12,
              discrete: false
            };
          } else if ([2, 5, 8, 11].includes(paramId)) {
            // Mix knobs: 0 to 1 (continuous)
            knobConfig = {
              type: 'mix',
              min: 0,
              max: 1,
              discrete: false
            };
          } else if (paramId === 12) {
            // Selector knob: 1, 2, 3, 4 (discrete)
            knobConfig = {
              type: 'selector',
              min: 1,
              max: 4,
              discrete: true,
              values: [1, 2, 3, 4]
            };
          }
          // paramId 13 stays as is (no special config)
        }
        
        const label = document.createElement('label');
        let paramName = param.name || `Parameter ${param.id}`;
        if (knobConfig) {
          // Add type indicator to label
          paramName += ` (${knobConfig.type})`;
        }
        label.textContent = paramName;
        
        const knob = document.createElement('div');
        knob.className = 'knob';
        knob.id = `rack-${pluginId}-knob-${param.id}`;
        
        const valueDisplay = document.createElement('div');
        valueDisplay.className = 'value-display';
        
        const rangeDisplay = document.createElement('div');
        rangeDisplay.className = 'range-display';
        
        // Use hardcoded config if available, otherwise use param values
        const effectiveMin = knobConfig ? knobConfig.min : param.min;
        const effectiveMax = knobConfig ? knobConfig.max : param.max;
        
        // Initialize display
        if (knobConfig && knobConfig.discrete) {
          // For discrete values, param.value from server is the actual value
          // Find the closest discrete value
          const currentValue = param.value;
          let closestValue = knobConfig.values[0];
          let minDiff = Math.abs(currentValue - closestValue);
          for (const val of knobConfig.values) {
            const diff = Math.abs(currentValue - val);
            if (diff < minDiff) {
              minDiff = diff;
              closestValue = val;
            }
          }
          valueDisplay.textContent = `Value: ${closestValue}`;
          rangeDisplay.textContent = `Range: ${knobConfig.values[0]} – ${knobConfig.values[knobConfig.values.length - 1]}`;
        } else {
          // For continuous values, param.value is the actual value
          valueDisplay.textContent = `Value: ${formatValue(param.value)}`;
          rangeDisplay.textContent = `Range: ${formatValue(effectiveMin)} – ${formatValue(effectiveMax)}`;
        }
        
        wrapper.appendChild(label);
        wrapper.appendChild(knob);
        wrapper.appendChild(valueDisplay);
        wrapper.appendChild(rangeDisplay);
        
        let isDragging = false;
        // param.value from server is the actual value, normalize it using effective min/max
        let currentNormalized = normalizeValue(param.value, effectiveMin, effectiveMax);
        const stateKey = `${pluginId}-${param.id}`;
        
        // Initialize state with proper display value
        let initialDisplayValue;
        if (knobConfig && knobConfig.discrete) {
          // Find closest discrete value to current param.value
          const currentValue = param.value;
          let closestValue = knobConfig.values[0];
          let minDiff = Math.abs(currentValue - closestValue);
          for (const val of knobConfig.values) {
            const diff = Math.abs(currentValue - val);
            if (diff < minDiff) {
              minDiff = diff;
              closestValue = val;
            }
          }
          initialDisplayValue = closestValue;
          // Re-normalize based on the closest discrete value
          if (knobConfig.type === 'octave') {
            currentNormalized = (closestValue + 2) / 4.0;
          } else if (knobConfig.type === 'selector') {
            currentNormalized = (closestValue - 1) / 3.0;
          }
        } else {
          initialDisplayValue = param.value;
        }
        
        knobState.set(stateKey, { normalized: currentNormalized, raw: initialDisplayValue });
        let dragStartY = 0;
        let dragStartNormalized = currentNormalized;

        function updateKnobUI(normalizedValue, emit = true) {
          const clamped = Math.max(0, Math.min(1, normalizedValue));
          currentNormalized = clamped;
          const angle = angleFromNormalized(clamped);
          knob.style.transform = `rotate(${angle}deg)`;
          
          // Use hardcoded config if available, otherwise use param values
          const effectiveMin = knobConfig ? knobConfig.min : param.min;
          const effectiveMax = knobConfig ? knobConfig.max : param.max;
          
          let rawValue, displayValue;
          
          if (knobConfig && knobConfig.discrete) {
            // For discrete values, snap to nearest discrete value
            const discreteIndex = Math.round(clamped * (knobConfig.values.length - 1));
            const clampedIndex = Math.max(0, Math.min(knobConfig.values.length - 1, discreteIndex));
            displayValue = knobConfig.values[clampedIndex];
            
            // For OSC, we need to normalize the discrete value back to 0-1
            // This matches the normalization functions in pot_test.py
            if (knobConfig.type === 'octave') {
              // normalize_octave: (octave_value + 2) / 4.0
              rawValue = (displayValue + 2) / 4.0;
            } else if (knobConfig.type === 'selector') {
              // normalize_selector: selector_value / 3.0 (but we use 1-4, so adjust)
              // Map 1,2,3,4 to 0,1,2,3 then normalize
              rawValue = (displayValue - 1) / 3.0;
            } else {
              rawValue = clamped; // Fallback
            }
            
            valueDisplay.textContent = `Value: ${displayValue}`;
          } else {
            rawValue = denormalizeValue(clamped, effectiveMin, effectiveMax);
            displayValue = rawValue;
            valueDisplay.textContent = `Value: ${formatValue(rawValue)}`;
          }

          if (emit) {
            const previous = knobState.get(stateKey);

            if (!previous || Math.abs(previous.normalized - clamped) > 0.001) {
              knobState.set(stateKey, { normalized: clamped, raw: displayValue });
              // Send normalized value (0-1) for OSC, but display actual value
              socket.emit('knob_change', {
                rack: pluginId,
                knob: param.id,
                value: rawValue,  // Normalized value (0-1) for OSC
                displayValue: displayValue,  // Actual value for display
              });
              console.log(`📤 Rack ${pluginId} Param ${param.id} -> ${displayValue} (norm ${rawValue.toFixed(3)})`);
            }
          }
        }
        
        function handleDrag(clientY) {
          if (!isDragging) return;
          const deltaPixels = dragStartY - clientY;
          const normalizedDelta = deltaPixels / DRAG_SENSITIVITY;
          const normalized = dragStartNormalized + normalizedDelta;
          updateKnobUI(normalized);
        }
        
        knob.addEventListener('mousedown', (e) => {
          e.preventDefault();
          isDragging = true;
          dragStartY = e.clientY;
          dragStartNormalized = currentNormalized;
          document.addEventListener('mousemove', rotateKnob);
        }, { passive: false });

        knob.addEventListener('touchstart', (e) => {
          isDragging = true;
          const touch = e.touches[0];
          dragStartY = touch.clientY;
          dragStartNormalized = currentNormalized;
          document.addEventListener('touchmove', handleTouchMove, { passive: false });
        }, { passive: false });

        function handleTouchMove(e) {
          if (!isDragging) return;
          const touch = e.touches[0];
          handleDrag(touch.clientY);
          e.preventDefault();
        }

        function rotateKnob(e) {
          handleDrag(e.clientY);
        }
        
        function endInteraction() {
          if (isDragging) {
            isDragging = false;
            document.removeEventListener('mousemove', rotateKnob);
            document.removeEventListener('touchmove', handleTouchMove);
          }
        }

        document.addEventListener('touchend', endInteraction);
        document.addEventListener('touchcancel', endInteraction);
        document.addEventListener('mouseup', endInteraction);

        // Initialize position
        updateKnobUI(currentNormalized, false);

        return wrapper;
      }

      async function loadPlugins() {
        const statusMessage = document.getElementById('statusMessage');
        const container = document.getElementById('knobsContainer');

        try {
          statusMessage.textContent = 'Loading plugin data...';
          const response = await fetch('/api/plugins');
          if (!response.ok) {
            throw new Error(`Server responded with ${response.status}`);
          }
          const data = await response.json();
          let plugins = data.plugins || [];

          // Sort plugins by chain_position to reflect processing order
          plugins.sort((a, b) => {
            const posA = a.chain_position !== undefined ? a.chain_position : a.id;
            const posB = b.chain_position !== undefined ? b.chain_position : b.id;
            return posA - posB;
          });

          container.innerHTML = '';
          if (plugins.length === 0) {
            statusMessage.textContent = 'No plugins loaded from Carla.';
            return;
          }

          const chainLength = plugins.length;
          plugins.forEach((plugin, index) => {
            const chainPosition = plugin.chain_position !== undefined ? plugin.chain_position : index;
            const rack = createRack(plugin, chainPosition, chainLength);
            container.appendChild(rack);
          });
          
          // Update arrow states
          updateArrowStates(container);

          statusMessage.textContent = `Loaded ${plugins.length} plugin(s) from Carla.`;
        } catch (error) {
          console.error('Failed to load plugin metadata:', error);
          statusMessage.textContent = 'Failed to load plugin data. Ensure Carla API is running.';
        }
      }

      async function loadPluginDatabase() {
        if (!pluginSelect || !addPluginButton) {
          return;
        }

        try {
          setPluginStatus('Loading plugin database...', 'info');
          const response = await fetch('/api/plugin-db');
          if (!response.ok) {
            throw new Error(`Server responded with ${response.status}`);
          }
          const data = await response.json();
          availablePlugins = data.plugins || [];

          pluginSelect.innerHTML = '';

          if (availablePlugins.length === 0) {
            const option = document.createElement('option');
            option.value = '';
            option.textContent = 'No plugins available';
            pluginSelect.appendChild(option);
            pluginSelect.disabled = true;
            addPluginButton.disabled = true;
            setPluginStatus('Plugin database is empty.', 'error');
            return;
          }

          const placeholder = document.createElement('option');
          placeholder.value = '';
          placeholder.textContent = 'Select a plugin…';
          pluginSelect.appendChild(placeholder);

          availablePlugins.forEach((plugin) => {
            const option = document.createElement('option');
            option.value = plugin.id;
            option.textContent = plugin.display_name || plugin.id;
            if (plugin.description) {
              option.title = plugin.description;
            }
            pluginSelect.appendChild(option);
          });

          pluginSelect.disabled = false;
          addPluginButton.disabled = false;
          setPluginStatus(`Loaded ${availablePlugins.length} plugin option(s).`, 'success');
        } catch (error) {
          console.error('Failed to load plugin database:', error);
          pluginSelect.innerHTML = '';
          const option = document.createElement('option');
          option.value = '';
          option.textContent = 'Failed to load plugin list';
          pluginSelect.appendChild(option);
          pluginSelect.disabled = true;
          addPluginButton.disabled = true;
          setPluginStatus('Failed to load plugin database. Ensure Carla API is running.', 'error');
        }
      }

      async function handleDiscoverPlugins() {
        if (!discoverPluginsButton) return;
        
        discoverPluginsButton.disabled = true;
        setPluginStatus('Discovering plugins from configured paths...', 'info');

        try {
          const response = await fetch('/api/plugins/discover');
          if (!response.ok) {
            throw new Error(`Server responded with ${response.status}`);
          }
          const data = await response.json();
          const discoveredPlugins = data.plugins || [];

          if (discoveredPlugins.length === 0) {
            setPluginStatus('No plugins discovered. Check your plugin paths configuration.', 'error');
            discoverPluginsButton.disabled = false;
            return;
          }

          // Merge discovered plugins with existing database
          // Use a Map to avoid duplicates (by id)
          const pluginMap = new Map();
          
          // Add existing plugins
          availablePlugins.forEach(plugin => {
            pluginMap.set(plugin.id, { ...plugin, source: 'database' });
          });
          
          // Add discovered plugins (will overwrite duplicates)
          discoveredPlugins.forEach(plugin => {
            pluginMap.set(plugin.id, { ...plugin, source: 'discovered' });
          });

          // Convert back to array
          availablePlugins = Array.from(pluginMap.values());

          // Update the select dropdown
          pluginSelect.innerHTML = '';
          const placeholder = document.createElement('option');
          placeholder.value = '';
          placeholder.textContent = 'Select a plugin…';
          pluginSelect.appendChild(placeholder);

          availablePlugins.forEach((plugin) => {
            const option = document.createElement('option');
            option.value = plugin.id;
            const sourceLabel = plugin.source === 'discovered' ? ' [Discovered]' : '';
            option.textContent = (plugin.display_name || plugin.id) + sourceLabel;
            if (plugin.description) {
              option.title = plugin.description;
            }
            pluginSelect.appendChild(option);
          });

          pluginSelect.disabled = false;
          addPluginButton.disabled = false;
          setPluginStatus(`Discovered ${discoveredPlugins.length} plugin(s). Total available: ${availablePlugins.length}`, 'success');
        } catch (error) {
          console.error('Failed to discover plugins:', error);
          setPluginStatus(`Failed to discover plugins: ${error.message}`, 'error');
        } finally {
          discoverPluginsButton.disabled = false;
        }
      }

      async function handleAddPlugin() {
        if (!pluginSelect) return;
        const pluginId = pluginSelect.value;
        if (!pluginId) {
          setPluginStatus('Select a plugin before adding.', 'error');
          return;
        }

        addPluginButton.disabled = true;
        setPluginStatus('Adding plugin...', 'info');

        try {
          const response = await fetch('/api/plugins/add', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ plugin_id: pluginId }),
          });
          const data = await response.json();

          if (!response.ok) {
            const errorMessage = data.error || data.detail || `Server responded with ${response.status}`;
            setPluginStatus(`Failed to add plugin: ${errorMessage}`, 'error');
          } else {
            const pluginName = data.plugin?.name || pluginId;
            setPluginStatus(`Added plugin: ${pluginName}`, 'success');
            await loadPlugins();
          }
        } catch (error) {
          console.error('Failed to add plugin:', error);
          setPluginStatus(`Failed to add plugin: ${error}`, 'error');
        } finally {
          addPluginButton.disabled = false;
        }
      }

      async function initialize() {
        await loadPluginDatabase();
        await loadPlugins();
      }

      window.addEventListener('DOMContentLoaded', () => {
        initialize();
      });
    </script>
  </body>
</html>
