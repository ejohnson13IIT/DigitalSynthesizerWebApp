<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>UDP Knob Control</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
      body {
        font-family: sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background-color: #111;
        color: #fff;
      }

      input[type="range"] {
        width: 300px;
        accent-color: #00ffcc;
      }

      label {
        margin-bottom: 10px;
        font-size: 1.2em;
      }

      #value {
        margin-top: 10px;
        font-size: 1.5em;
        color: #00ffcc;
      }
    </style>
  </head>
  <body>
    <label for="knob">Adjust Parameter</label>
    <input type="range" id="knob" min="0" max="100" step="1">
    <div id="value">Value: 50</div>

    <script>
      const socket = io('http://synthbox.local:5000');

      const knob = document.getElementById('knob');
      const valueLabel = document.getElementById('value');

      let previousValue=0;

      knob.addEventListener('input', (event) => {
          const value = event.target.value;
          valueLabel.textContent = "Value: " + value;
          if(value!=previousValue){
            socket.emit('knob_change', {value: parseInt(value)});
            console.log("Sent Value: ", value);
            previousValue=value;
          }
      });
    </script>
  </body>
</html>
