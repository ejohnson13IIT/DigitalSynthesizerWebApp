<!doctype html>
<html>
<head>
    <title>Pi Socket Latency Test</title>
    <script src="https://cdn.jsdelivr.net/npm/nexusui@2.0.5/dist/NexusUI.js"></script>
</head>
<body>
    <h2>TCP vs UDP Latency Test</h2>
    <form action="/send" method="post">
        <label>Message:</label>
        <input name="msg"><br><br>

        <label>Protocol:</label>
        <select name="proto">
            <option value="tcp">TCP</option>
            <option value="udp">UDP</option>
        </select>
        <br><br>

        <input type="submit" value="Send">
    </form>

    {% if result %}
    <h3>Result:</h3>
    <p>{{ result }}</p>
    {% endif %}

    <h3>Knob Control</h3>
    <canvas nx="dial" id="gainKnob"></canvas>
    <script>
        const knob = new Nexus.Dial('#gainKnob', {
            size: [100, 100],
            min: 0,
            max: 1,
            step: 0,
            value: 0.5
        });
        knob.on('change', async (v) => {
            await fetch('/update_knob', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ value: v })
            });
        });
    </script>
</body>
</html>
